<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spin the Wheel</title>
<style>
:root{
  --bg:#0a0a1a;--surface:#12122a;--surface2:#1a1a3a;--border:rgba(255,255,255,0.1);
  --text:#f0f0ff;--muted:#7070a0;
  --c1:#7c3aed;--c2:#059669;--c3:#dc2626;--c4:#d97706;--c5:#2563eb;
  --c1l:#a78bfa;--c2l:#34d399;--c3l:#f87171;--c4l:#fbbf24;--c5l:#60a5fa;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Segoe UI',Arial,sans-serif;
  color:var(--text);
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
#confetti-canvas{position:fixed;inset:0;pointer-events:none;z-index:300;display:none}

/* Full viewport layout */
#app{
  position:fixed;inset:0;z-index:1;
  display:grid;
  grid-template-rows:auto 1fr;
  align-items:stretch;
}

/* HEADER */
#header{
  display:flex;align-items:center;justify-content:center;
  position:relative;
  padding:clamp(10px,2vh,20px) clamp(14px,3vw,36px);
}
#titlewrap{text-align:center;pointer-events:none}
#title{
  font-size:clamp(1.2rem,2.8vw,2rem);font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,var(--c1l),var(--c2l),var(--c4l));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#subtitle{font-size:clamp(9px,1.1vw,12px);color:var(--muted);letter-spacing:1px;margin-top:2px}

.hdr-btn{
  position:absolute;
  background:var(--surface2);border:1px solid var(--border);border-radius:12px;
  padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;
  font-size:clamp(10px,1.1vw,13px);color:var(--text);transition:all 0.2s;user-select:none;
  white-space:nowrap;
}
.hdr-btn:hover{background:#252545;border-color:rgba(255,255,255,0.22)}
#fs-btn{left:clamp(14px,3vw,36px);top:50%;transform:translateY(-50%)}
#menu-btn{right:clamp(14px,3vw,36px);top:50%;transform:translateY(-50%)}
#ham{display:flex;flex-direction:column;gap:4px}
#ham span{display:block;width:17px;height:2px;background:var(--text);border-radius:2px;transition:all 0.28s}
#menu-btn.open #ham span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
#menu-btn.open #ham span:nth-child(2){opacity:0;transform:scaleX(0)}
#menu-btn.open #ham span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* MAIN — fills remaining height exactly */
#main{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:clamp(16px,3vw,48px);
  padding:0 clamp(14px,3vw,36px) clamp(10px,2vh,20px);
  overflow:hidden;
  min-height:0;
}

#canvas-wrap{
  position:relative;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.glow-ring{
  position:absolute;inset:-10px;border-radius:50%;opacity:0.2;
  animation:gspin 8s linear infinite;z-index:0;
  background:conic-gradient(var(--c1),var(--c5),var(--c2),var(--c3),var(--c4),var(--c1));
}
@keyframes gspin{to{transform:rotate(360deg)}}
#ptr{
  position:absolute;top:-26px;left:50%;transform:translateX(-50%);
  z-index:4;filter:drop-shadow(0 4px 14px rgba(239,68,68,0.85));
}
#wheel{display:block;position:relative;z-index:1}
#center-btn{
  position:absolute;border-radius:50%;border:3px solid rgba(255,255,255,0.15);
  background:linear-gradient(145deg,#1e0f4a,#0a1050);
  color:#fff;font-weight:900;letter-spacing:0.5px;cursor:pointer;z-index:3;
  box-shadow:0 0 0 4px rgba(124,58,237,0.35),0 0 30px rgba(124,58,237,0.5);
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
  text-align:center;line-height:1.2;
}
#center-btn:hover:not(:disabled){
  transform:scale(1.1);
  box-shadow:0 0 0 6px rgba(124,58,237,0.45),0 0 50px rgba(124,58,237,0.7);
}
#center-btn:disabled{opacity:0.4;cursor:not-allowed}

/* Side panel */
#side-panel{
  display:flex;flex-direction:column;
  gap:clamp(7px,1.2vh,13px);
  align-items:stretch;flex-shrink:0;
  min-width:clamp(120px,13vw,180px);
}
#side-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:600}
#counter-wrap{display:flex;flex-direction:column;gap:6px}
.chip2{
  padding:clamp(7px,1vh,11px) clamp(10px,1.2vw,16px);
  border-radius:10px;border:1px solid var(--border);
  color:var(--muted);background:var(--surface2);
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  font-size:clamp(11px,1.1vw,14px);
}
.chip2.on{color:#fff}
.chip2[data-n="SEKRET"].on{background:rgba(124,58,237,0.2);border-color:var(--c1);color:var(--c1l)}
.chip2[data-n="PJ 1"].on{background:rgba(5,150,105,0.2);border-color:var(--c2);color:var(--c2l)}
.chip2[data-n="PJ 2"].on{background:rgba(220,38,38,0.2);border-color:var(--c3);color:var(--c3l)}
.chip2[data-n="PJ 3"].on{background:rgba(217,119,6,0.2);border-color:var(--c4);color:var(--c4l)}
.chip2[data-n="PJ 4"].on{background:rgba(37,99,235,0.2);border-color:var(--c5);color:var(--c5l)}
.chip2 .cnt{font-weight:700;font-size:clamp(14px,1.6vw,20px)}
#reset-btn{
  padding:clamp(7px,1vh,11px) clamp(10px,1.2vw,16px);
  background:transparent;border:1px solid var(--border);
  border-radius:9px;color:var(--muted);font-size:clamp(10px,1vw,13px);
  cursor:pointer;transition:all 0.2s;text-align:center;
}
#reset-btn:hover{border-color:rgba(255,255,255,0.25);color:var(--text)}

/* SETTINGS POPUP */
#settings-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(6px);padding:20px;
}
#settings-overlay.open{display:flex}
#settings-box{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  width:min(640px,95vw);max-height:90vh;overflow-y:auto;
  padding:24px;display:flex;flex-direction:column;gap:14px;
  animation:slideUp 0.3s cubic-bezier(0.34,1.4,0.64,1);
}
@keyframes slideUp{from{transform:translateY(40px) scale(0.96);opacity:0}to{transform:none;opacity:1}}
#settings-box::-webkit-scrollbar{width:4px}
#settings-box::-webkit-scrollbar-track{background:transparent}
#settings-box::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.settings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.settings-header h2{font-size:16px;font-weight:700;color:var(--text)}
#settings-close{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;color:var(--muted);font-size:13px;cursor:pointer}
#settings-close:hover{color:var(--text)}

.scard{background:var(--surface2);border-radius:14px;padding:14px 18px;border:1px solid var(--border)}
.slabel{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;font-weight:600}

#mode-row{display:flex;gap:8px;flex-wrap:wrap}
.mode-btn{padding:8px 16px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;line-height:1.4}
.mode-btn:hover{border-color:var(--c1l);color:var(--c1l)}
.mode-btn.active{background:var(--c1);border-color:var(--c1);color:#fff;box-shadow:0 0 16px rgba(124,58,237,0.4)}

#wsize-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#wsize-slider{flex:1;min-width:140px;accent-color:var(--c1l)}
#wsize-val{font-size:16px;font-weight:700;color:var(--c1l);min-width:52px}
.size-save-btn{padding:7px 18px;background:var(--c1);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.size-save-btn:hover{background:#6d28d9}

#seg-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px}
.seg-tab{padding:6px 13px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:12px;font-weight:500;cursor:pointer;transition:all 0.2s}
.seg-tab.active{color:#fff}
.seg-tab[data-s="SEKRET"].active{background:var(--c1)}
.seg-tab[data-s="PJ 1"].active{background:var(--c2)}
.seg-tab[data-s="PJ 2"].active{background:var(--c3)}
.seg-tab[data-s="PJ 3"].active{background:var(--c4)}
.seg-tab[data-s="PJ 4"].active{background:var(--c5)}
#q-editor{width:100%;height:95px;padding:10px;font-size:13px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;line-height:1.6;resize:vertical}
#q-editor:focus{outline:none;border-color:var(--c1l)}
.q-save-btn{margin-top:8px;padding:8px 18px;background:var(--c2);border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.q-save-btn:hover{background:#047857}
.saved-msg{font-size:11px;color:var(--c2l);margin-top:6px;display:none}

/* POPUP result */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;
  display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);padding:20px;
}
#overlay.show{display:flex}
#popup{
  background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:28px;
  width:min(700px,94vw);text-align:center;overflow:hidden;
  animation:popIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes popIn{from{transform:scale(0.4) rotate(-5deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
#popup-top{padding:clamp(24px,4vh,44px) clamp(24px,5vw,52px) clamp(18px,3vh,30px)}
#popup-kepada{font-size:clamp(12px,1.4vw,16px);text-transform:uppercase;letter-spacing:2.5px;color:var(--muted);margin-bottom:10px;font-weight:600}
#popup-badge{display:inline-block;padding:clamp(10px,1.8vh,18px) clamp(28px,6vw,56px);border-radius:18px;font-size:clamp(1.8rem,5vw,3.4rem);font-weight:800;letter-spacing:1px;margin-bottom:clamp(16px,2.5vh,28px)}
#popup-divider{width:70px;height:3px;border-radius:2px;margin:0 auto clamp(12px,2vh,24px)}
#popup-qlabel{font-size:clamp(10px,1.1vw,13px);text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:clamp(10px,1.5vh,16px);font-weight:600}
#popup-q{font-size:clamp(1.1rem,2.8vw,1.7rem);line-height:1.7;color:var(--text);background:var(--surface2);border-radius:16px;padding:clamp(14px,2.5vh,26px) clamp(16px,3vw,34px);font-weight:500}
#popup-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:clamp(14px,2.5vh,26px) clamp(24px,5vw,52px) clamp(18px,3vh,32px);border-top:1px solid var(--border);background:rgba(0,0,0,0.18)}
#popup-next{padding:clamp(10px,1.6vh,15px) clamp(20px,3vw,34px);border-radius:12px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:clamp(12px,1.4vw,16px);font-weight:600;cursor:pointer;transition:all 0.2s}
#popup-next:hover{background:#2a2a4a}
#popup-close{padding:clamp(10px,1.6vh,15px) clamp(20px,3vw,34px);border-radius:12px;border:none;color:#fff;font-size:clamp(12px,1.4vw,16px);font-weight:600;cursor:pointer}

#sound-toggle{position:fixed;bottom:clamp(12px,2vh,22px);right:clamp(12px,2vw,22px);background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;z-index:50}
#sound-toggle:hover{background:#252545}

@media(max-width:560px){
  #main{flex-direction:column;gap:14px}
  #side-panel{flex-direction:row;flex-wrap:wrap;justify-content:center;min-width:unset;width:100%}
  #counter-wrap{flex-direction:row;flex-wrap:wrap;justify-content:center}
  .chip2{width:auto;flex:1;min-width:80px}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<canvas id="confetti-canvas"></canvas>

<div id="app">
  <div id="header">
    <button class="hdr-btn" id="fs-btn" onclick="goFS()">⛶ Layar Penuh</button>
    <div id="titlewrap">
      <div id="title">SPIN THE WHEEL</div>
      <div id="subtitle">Pilih segmen &bull; Jawab pertanyaan</div>
    </div>
    <button class="hdr-btn" id="menu-btn" onclick="toggleSettings()">
      <div id="ham"><span></span><span></span><span></span></div>
      Pengaturan
    </button>
  </div>

  <div id="main">
    <div id="canvas-wrap">
      <div class="glow-ring"></div>
      <div id="ptr">
        <svg width="36" height="46" viewBox="0 0 36 46">
          <polygon points="18,44 2,4 34,4" fill="#ef4444"/>
          <polygon points="18,38 7,9 29,9" fill="#fca5a5" opacity="0.28"/>
        </svg>
      </div>
      <canvas id="wheel"></canvas>
      <button id="center-btn" onclick="spinW()">PUTAR</button>
    </div>
    <div id="side-panel">
      <div id="side-title">Spin Count</div>
      <div id="counter-wrap"></div>
      <button id="reset-btn" onclick="resetCounts()">&#8635; Reset Count</button>
    </div>
  </div>
</div>

<!-- SETTINGS POPUP -->
<div id="settings-overlay" onclick="closeSettings(event)">
  <div id="settings-box">
    <div class="settings-header">
      <h2>Pengaturan</h2>
      <button id="settings-close" onclick="toggleSettings()">Tutup ✕</button>
    </div>

    <div class="scard">
      <div class="slabel">Mode Segmen</div>
      <div id="mode-row">
        <button class="mode-btn active" data-m="1" onclick="setMode(1)">Mode 1<br><small style="font-weight:400;font-size:11px">5 segmen</small></button>
        <button class="mode-btn" data-m="2" onclick="setMode(2)">Mode 2<br><small style="font-weight:400;font-size:11px">10 segmen</small></button>
        <button class="mode-btn" data-m="3" onclick="setMode(3)">Mode 3<br><small style="font-weight:400;font-size:11px">15 segmen</small></button>
        <button class="mode-btn" data-m="4" onclick="setMode(4)">Mode 4<br><small style="font-weight:400;font-size:11px">20 segmen</small></button>
      </div>
    </div>

    <div class="scard">
      <div class="slabel">Ukuran Roda Spin</div>
      <div id="wsize-row">
        <span style="font-size:12px;color:var(--muted)">Kecil</span>
        <input type="range" id="wsize-slider" min="200" max="720" step="10" value="520" oninput="previewWSize(this.value)">
        <span style="font-size:12px;color:var(--muted)">Besar</span>
        <span id="wsize-val">520px</span>
        <button class="size-save-btn" onclick="saveWSize(event)">Simpan</button>
      </div>
    </div>

    <div class="scard">
      <div class="slabel">Edit Pertanyaan per Segmen</div>
      <div id="seg-tabs"></div>
      <textarea id="q-editor" placeholder="Satu pertanyaan per baris..."></textarea>
      <button class="q-save-btn" onclick="saveQ()">&#10003; Simpan Pertanyaan</button>
      <div class="saved-msg" id="q-saved-msg">Tersimpan!</div>
    </div>
  </div>
</div>

<!-- RESULT POPUP -->
<div id="overlay" onclick="closePopup()">
  <div id="popup" onclick="event.stopPropagation()">
    <div id="popup-top">
      <div id="popup-kepada">Pertanyaan Kepada</div>
      <div id="popup-badge"></div>
      <div id="popup-divider"></div>
      <div id="popup-qlabel">Soal</div>
      <div id="popup-q"></div>
    </div>
    <div id="popup-btns">
      <button id="popup-next" onclick="nextQPopup()">&#8635; Soal Lain</button>
      <button id="popup-close" onclick="closePopup()">Tutup</button>
    </div>
  </div>
</div>

<button id="sound-toggle" onclick="toggleSound()">🔊</button>
<audio id="cheer-audio" src="cheer.mp3" preload="auto"></audio>

<script>
// STARS
(function(){
  var c=document.getElementById('stars'),x=c.getContext('2d');
  function rs(){c.width=innerWidth;c.height=innerHeight;}rs();
  addEventListener('resize',rs);
  var st=[];for(var i=0;i<200;i++)st.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+0.3,o:Math.random()*0.5+0.2,sp:Math.random()*0.003+0.001,ph:Math.random()*Math.PI*2});
  function dr(){x.clearRect(0,0,c.width,c.height);st.forEach(function(s){s.ph+=s.sp;var o=s.o*(0.6+0.4*Math.sin(s.ph));x.beginPath();x.arc(s.x*c.width,s.y*c.height,s.r,0,2*Math.PI);x.fillStyle='rgba(200,200,255,'+o+')';x.fill();});requestAnimationFrame(dr);}
  dr();
})();

var UNIQ=["SEKRET","PJ 1","PJ 2","PJ 3","PJ 4"];
var COLORS={"SEKRET":"#7c3aed","PJ 1":"#059669","PJ 2":"#dc2626","PJ 3":"#d97706","PJ 4":"#2563eb"};
var COLORSL={"SEKRET":"#a78bfa","PJ 1":"#34d399","PJ 2":"#f87171","PJ 3":"#fbbf24","PJ 4":"#60a5fa"};
var QS={
  "SEKRET":["Apa tugas utama seorang sekretaris tim?","Bagaimana cara membuat notulensi rapat yang baik?","Apa yang dilakukan sekretaris jika ada surat masuk mendesak?","Sebutkan 3 keterampilan penting sekretaris profesional!","Bagaimana cara mengarsipkan dokumen dengan benar?"],
  "PJ 1":["Apa program kerja utama yang kamu penanggung jawabi?","Bagaimana cara kamu memantau progress program?","Apa kendala terbesar dalam menjalankan programmu?","Sebutkan indikator keberhasilan programmu!","Bagaimana kamu berkoordinasi dengan tim lain?"],
  "PJ 2":["Jelaskan langkah pertama pelaksanaan programmu!","Siapa saja sasaran dari program yang kamu kelola?","Bagaimana kamu menangani jika target tidak tercapai?","Apa inovasi yang kamu lakukan dalam program ini?","Bagaimana cara evaluasi program yang kamu terapkan?"],
  "PJ 3":["Apa output yang dihasilkan dari programmu semester ini?","Bagaimana cara kamu melibatkan masyarakat dalam program?","Apa tantangan paling berat yang pernah kamu hadapi?","Bagaimana kamu mendokumentasikan kegiatan programmu?","Sebutkan mitra yang terlibat dalam programmu!"],
  "PJ 4":["Apa perbedaan programmu dengan program lain di tim?","Bagaimana kamu memastikan program berjalan sesuai jadwal?","Apa yang akan kamu perbaiki dari programmu ke depan?","Bagaimana kamu melaporkan hasil program kepada atasan?","Sebutkan 2 pencapaian terbaik programmu tahun ini!"]
};
var used={},cnt={};UNIQ.forEach(function(u){used[u]=[];cnt[u]=0;});
var winner=null,angle=0,spinning=false,spinMode=1,editSeg="SEKRET",soundOn=true;

// Wheel size: fit to available space by default, or use saved
var savedSize=localStorage.getItem('wheelSize');
var wheelSize=savedSize?parseInt(savedSize):null; // null = auto
document.getElementById('wsize-slider').value=savedSize||520;
document.getElementById('wsize-val').textContent=(savedSize||520)+'px';

function shade(c,p){
  var r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  r=Math.max(0,Math.min(255,r+p));g=Math.max(0,Math.min(255,g+p));b=Math.max(0,Math.min(255,b+p));
  return'#'+[r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}
function buildSegs(m){var s=[];for(var i=0;i<m;i++)UNIQ.forEach(function(u){s.push(u);});return s;}
var SEGS=buildSegs(1);

function getAutoSize(){
  // Fit wheel into available main area, leaving room for side panel
  var main=document.getElementById('main');
  var mr=main.getBoundingClientRect();
  var sideW=Math.max(140,Math.round(innerWidth*0.13))+50;
  var gap=Math.max(16,Math.round(innerWidth*0.03));
  var availW=mr.width-sideW-gap-28;
  var availH=mr.height-28;
  return Math.max(200,Math.min(availW,availH,720));
}

function applyWheelSize(){
  var s=wheelSize||getAutoSize();
  var cv=document.getElementById('wheel');
  // Use devicePixelRatio for crisp canvas on all screens
  var dpr=window.devicePixelRatio||1;
  cv.width=Math.round(s*dpr);
  cv.height=Math.round(s*dpr);
  cv.style.width=s+'px';
  cv.style.height=s+'px';
  var bsize=Math.round(s*0.18);
  var cb=document.getElementById('center-btn');
  cb.style.width=bsize+'px';cb.style.height=bsize+'px';
  cb.style.fontSize=Math.round(bsize*0.17)+'px';
  drawWheel(angle);
}

function drawWheel(a){
  var cv=document.getElementById('wheel');
  var dpr=window.devicePixelRatio||1;
  var W=cv.width,cx=W/2,cy=W/2,R=W/2-Math.round(dpr*5);
  var ctx=cv.getContext('2d');
  ctx.save();
  ctx.clearRect(0,0,W,W);

  var N=SEGS.length,arc=2*Math.PI/N;

  // Draw slices
  for(var i=0;i<N;i++){
    var s=a+i*arc,e=s+arc;
    var col=i%2===0?COLORS[SEGS[i]]:shade(COLORS[SEGS[i]],-38);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,s,e);ctx.closePath();
    ctx.fillStyle=col;ctx.fill();
    ctx.strokeStyle='rgba(4,4,14,0.92)';ctx.lineWidth=Math.round(dpr*2.5);ctx.stroke();
  }

  // Draw labels — use imageSmoothingEnabled + crisp font rendering
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality='high';

  for(var i=0;i<N;i++){
    var s=a+i*arc;
    var mid=s+arc/2;
    ctx.save();
    ctx.translate(cx,cy);
    ctx.rotate(mid);

    // text sits at 68% of radius, centered in slice
    var textR=R*0.66;
    // Font size scales with wheel size and number of segments
    var physPx=Math.round(W/(N>15?36:N>10?30:N>5?24:20));
    physPx=Math.max(Math.round(dpr*11),Math.min(physPx,Math.round(dpr*28)));

    ctx.font='900 '+physPx+'px "Segoe UI",Arial,Helvetica,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';

    // Multi-pass: shadow then fill for max sharpness
    ctx.shadowColor='rgba(0,0,0,0.95)';
    ctx.shadowBlur=Math.round(dpr*6);
    ctx.shadowOffsetX=Math.round(dpr*1);
    ctx.shadowOffsetY=Math.round(dpr*1);
    ctx.fillStyle='#ffffff';
    ctx.fillText(SEGS[i],textR,0);
    // Second pass — no shadow, slight offset for boldness
    ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.fillText(SEGS[i],textR,0);

    ctx.restore();
  }

  // Center hub
  var hubR=R*0.13;
  var grd=ctx.createRadialGradient(cx,cy,0,cx,cy,hubR);
  grd.addColorStop(0,'#2e1a60');grd.addColorStop(1,'#0a0a1a');
  ctx.beginPath();ctx.arc(cx,cy,hubR,0,2*Math.PI);
  ctx.fillStyle=grd;ctx.fill();
  ctx.strokeStyle='rgba(167,139,250,0.65)';ctx.lineWidth=Math.round(dpr*2);ctx.stroke();
  ctx.fillStyle='rgba(220,220,255,0.95)';
  ctx.font='bold '+Math.round(hubR*0.65)+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='transparent';ctx.shadowBlur=0;
  ctx.fillText('★',cx,cy);

  ctx.restore();
}

function spinW(){
  if(spinning)return;
  spinning=true;
  document.getElementById('center-btn').disabled=true;
  var extra=Math.PI*2*(8+Math.random()*9),dur=3800+Math.random()*1400,t0=performance.now(),a0=angle;
  function ease(t){return 1-Math.pow(1-t,3.5);}
  function step(now){
    var t=Math.min((now-t0)/dur,1);
    angle=a0+extra*ease(t);drawWheel(angle);
    if(t<1){requestAnimationFrame(step);return;}
    spinning=false;document.getElementById('center-btn').disabled=false;showResult();
  }
  requestAnimationFrame(step);
}

function showResult(){
  var N=SEGS.length,arc=2*Math.PI/N;
  var norm=(((-angle-Math.PI/2)%(2*Math.PI))+(2*Math.PI))%(2*Math.PI);
  var idx=Math.floor(norm/arc)%N;
  winner=SEGS[idx];cnt[winner]++;
  updateCounters();openPopup();
}

function getQ(name){
  var pool=QS[name]||[];
  if(!pool.length)return"Belum ada pertanyaan.";
  var av=pool.filter(function(q){return used[name].indexOf(q)<0;});
  if(!av.length){used[name]=[];av=pool.slice();}
  var q=av[Math.floor(Math.random()*av.length)];used[name].push(q);return q;
}

function openPopup(){
  var c=COLORS[winner],cl=COLORSL[winner];
  document.getElementById('popup-badge').textContent=winner;
  document.getElementById('popup-badge').style.cssText='display:inline-block;padding:clamp(10px,1.8vh,18px) clamp(28px,6vw,56px);border-radius:18px;font-size:clamp(1.8rem,5vw,3.4rem);font-weight:800;letter-spacing:1px;margin-bottom:clamp(16px,2.5vh,28px);background:'+c+'22;color:'+cl+';border:2px solid '+c+'77';
  document.getElementById('popup-q').textContent=getQ(winner);
  document.getElementById('popup-divider').style.background=cl;
  document.getElementById('popup-close').style.background=c;
  document.getElementById('overlay').classList.add('show');
  startConfetti();playCheer();
}
function nextQPopup(){if(winner)document.getElementById('popup-q').textContent=getQ(winner);}
function closePopup(){document.getElementById('overlay').classList.remove('show');stopConfetti();}

// CONFETTI
var cfAnim=null,cfP=[];
var CC=document.getElementById('confetti-canvas'),CCX=CC.getContext('2d');
var cfC=['#a78bfa','#34d399','#f87171','#fbbf24','#60a5fa','#fb7185','#4ade80','#f97316','#e879f9','#22d3ee'];
function startConfetti(){
  CC.style.display='block';CC.width=innerWidth;CC.height=innerHeight;cfP=[];
  for(var i=0;i<150;i++){var fl=i<75;cfP.push({x:fl?-10:innerWidth+10,y:Math.random()*innerHeight*0.6,vx:(fl?1:-1)*(4+Math.random()*7),vy:-(3+Math.random()*6),g:0.2,color:cfC[Math.floor(Math.random()*cfC.length)],size:5+Math.random()*10,rot:Math.random()*Math.PI*2,rv:(Math.random()-0.5)*0.25,shape:Math.random()<0.5?'rect':'circle',alpha:1,fd:0.01+Math.random()*0.008});}
  var t0=performance.now();
  function anim(now){CCX.clearRect(0,0,CC.width,CC.height);var alive=false;cfP.forEach(function(p){if(p.alpha<=0)return;alive=true;p.x+=p.vx;p.y+=p.vy;p.vy+=p.g;p.rot+=p.rv;if(now-t0>1800)p.alpha=Math.max(0,p.alpha-p.fd);CCX.save();CCX.globalAlpha=p.alpha;CCX.translate(p.x,p.y);CCX.rotate(p.rot);CCX.fillStyle=p.color;if(p.shape==='rect'){CCX.fillRect(-p.size/2,-p.size/4,p.size,p.size/2);}else{CCX.beginPath();CCX.arc(0,0,p.size/2,0,2*Math.PI);CCX.fill();}CCX.restore();});if(alive)cfAnim=requestAnimationFrame(anim);else CC.style.display='none';}
  if(cfAnim)cancelAnimationFrame(cfAnim);cfAnim=requestAnimationFrame(anim);
}
function stopConfetti(){if(cfAnim)cancelAnimationFrame(cfAnim);CC.style.display='none';cfP.forEach(function(p){p.alpha=0;});}

function playCheer(){if(!soundOn)return;var a=document.getElementById('cheer-audio');if(a){a.currentTime=0;a.play().catch(function(){});}}
function toggleSound(){soundOn=!soundOn;document.getElementById('sound-toggle').textContent=soundOn?'🔊':'🔇';}

function updateCounters(){
  document.getElementById('counter-wrap').innerHTML=UNIQ.map(function(u){
    return'<div class="chip2'+(cnt[u]>0?' on':'')+'" data-n="'+u+'"><span>'+u+'</span><span class="cnt">'+cnt[u]+'</span></div>';
  }).join('');
}
function resetCounts(){UNIQ.forEach(function(u){cnt[u]=0;used[u]=[];});winner=null;updateCounters();}

function toggleSettings(){
  var o=document.getElementById('settings-overlay'),b=document.getElementById('menu-btn');
  var opening=!o.classList.contains('open');
  o.classList.toggle('open');b.classList.toggle('open');
}
function closeSettings(e){if(e.target===document.getElementById('settings-overlay'))toggleSettings();}

function setMode(m){
  spinMode=m;SEGS=buildSegs(m);
  document.querySelectorAll('.mode-btn').forEach(function(b){b.classList.toggle('active',parseInt(b.dataset.m)===m);});
  drawWheel(angle);updateCounters();
}

function previewWSize(v){
  wheelSize=parseInt(v);
  document.getElementById('wsize-val').textContent=v+'px';
  applyWheelSize();
}
function saveWSize(e){
  localStorage.setItem('wheelSize',wheelSize);
  var b=e.target;var orig=b.textContent;b.textContent='Tersimpan!';
  setTimeout(function(){b.textContent=orig;},1500);
}

function buildTabs(){
  document.getElementById('seg-tabs').innerHTML=UNIQ.map(function(u){
    return'<button class="seg-tab'+(u===editSeg?' active':'')+'" data-s="'+u+'" onclick="selSeg(\''+u+'\')">'+u+'</button>';
  }).join('');
  document.getElementById('q-editor').value=(QS[editSeg]||[]).join('\n');
}
function selSeg(s){editSeg=s;buildTabs();}
function saveQ(){
  var lines=document.getElementById('q-editor').value.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  QS[editSeg]=lines;used[editSeg]=[];
  var m=document.getElementById('q-saved-msg');m.style.display='block';setTimeout(function(){m.style.display='none';},2000);
}

function goFS(){
  var el=document.documentElement;
  if(!document.fullscreenElement){(el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen).call(el);}
  else{(document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document);}
}

// On resize, re-fit wheel if no saved size
window.addEventListener('resize',function(){
  if(!localStorage.getItem('wheelSize'))wheelSize=null;
  applyWheelSize();
});

// INIT
buildTabs();updateCounters();
// Wait for layout then size wheel
requestAnimationFrame(function(){applyWheelSize();});
</script>
